<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hcuhs.kr 서버 시간</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a6e 0%, #2a52a0 30%, #1a3a7c 60%, #162d5e 100%);
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,170,255,0.2) 0%, transparent 70%);
            top: -200px; left: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(130,200,255,0.15) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            pointer-events: none;
        }

        /* 파티클 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(180,210,255,0.2);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }

        /* 메인 카드 */
        .glass-card {
            position: relative;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 32px;
            padding: 2rem 3rem 2.2rem;
            text-align: center;
            width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: min-height 0.3s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            border-radius: 32px 32px 0 0;
        }

        /* 배지 */
        .server-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(220,235,255,0.9);
            letter-spacing: 0.05em;
            margin-bottom: 1.1rem;
        }

        /* 탭 네비게이션 */
        .tab-nav {
            display: flex;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 4px;
            gap: 2px;
            margin-bottom: 1.6rem;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            cursor: pointer;
            padding: 7px 0;
            border-radius: 50px;
            font-family: 'Pretendard', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(200,220,255,0.5);
            letter-spacing: 0.04em;
            transition: all 0.25s ease;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.95);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .tab-btn:hover:not(.active) {
            color: rgba(200,220,255,0.8);
            background: rgba(255,255,255,0.06);
        }

        /* 탭 패널 */
        .tab-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .tab-panel.active {
            display: flex;
        }

        /* ── 서버시간 패널 ── */
        .date-display {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-bottom: 0.6rem;
            color: rgba(255,255,255,0.75);
        }

        .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0;
            line-height: 1;
            margin-bottom: 0.6rem;
        }

        .clock-display span {
            font-size: 4.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            display: inline-block;
            color: rgba(255,255,255,0.15);
            -webkit-text-stroke: 1px rgba(255,255,255,0.55);
            text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 2px 8px rgba(255,255,255,0.08);
            filter: drop-shadow(0 2px 6px rgba(200,220,255,0.2));
        }

        .clock-display .colon {
            font-size: 4rem;
            letter-spacing: 0;
            padding: 0 1px;
        }

        @keyframes digitTick {
            0%   { opacity: 0.4; transform: translateY(-4px); }
            100% { opacity: 1;   transform: translateY(0); }
        }
        .digit-tick {
            animation: digitTick 0.2s ease-out both;
        }

        .sync-status {
            margin-top: 0.7rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(200,220,255,0.5);
            letter-spacing: 0.04em;
            transition: all 0.4s ease;
            min-height: 1.2em;
        }
        .sync-status.synced { color: rgba(100,220,130,0.8); }
        .sync-status.failed { color: rgba(255,120,120,0.8); }

        /* ── 공통 큰 숫자 표시 ── */
        .big-time {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .big-time span {
            font-size: 4.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            display: inline-block;
            color: rgba(255,255,255,0.15);
            -webkit-text-stroke: 1px rgba(255,255,255,0.55);
            text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 2px 8px rgba(255,255,255,0.08);
            filter: drop-shadow(0 2px 6px rgba(200,220,255,0.2));
        }
        .big-time .colon {
            font-size: 4rem;
            letter-spacing: 0;
            padding: 0 1px;
        }
        .big-time .ms {
            font-size: 2rem;
            letter-spacing: 0;
            padding-left: 3px;
            opacity: 0.7;
        }

        /* 밀리초 레이블 */
        .ms-label {
            font-size: 0.7rem;
            color: rgba(200,220,255,0.4);
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        /* ── 컨트롤 버튼 ── */
        .ctrl-row {
            display: flex;
            gap: 10px;
            margin-top: 0.6rem;
            width: 100%;
            justify-content: center;
        }

        .ctrl-btn {
            flex: 1;
            max-width: 120px;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            padding: 10px 0;
            font-family: 'Pretendard', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s ease;
            outline: none;
        }

        .ctrl-btn.primary {
            background: rgba(100,180,255,0.25);
            border: 1px solid rgba(100,180,255,0.4);
            color: rgba(180,230,255,0.95);
        }
        .ctrl-btn.primary:hover {
            background: rgba(100,180,255,0.38);
            box-shadow: 0 0 16px rgba(100,180,255,0.25);
        }
        .ctrl-btn.primary.running {
            background: rgba(255,120,100,0.22);
            border-color: rgba(255,140,120,0.4);
            color: rgba(255,190,180,0.95);
        }
        .ctrl-btn.primary.running:hover {
            background: rgba(255,120,100,0.35);
            box-shadow: 0 0 16px rgba(255,120,100,0.25);
        }

        .ctrl-btn.secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(200,220,255,0.7);
        }
        .ctrl-btn.secondary:hover {
            background: rgba(255,255,255,0.13);
            color: rgba(220,235,255,0.9);
        }
        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ── 타이머 입력 ── */
        .timer-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-bottom: 0.6rem;
        }

        .time-input-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .time-input-label {
            font-size: 0.62rem;
            color: rgba(200,220,255,0.4);
            font-weight: 600;
            letter-spacing: 0.06em;
        }

        .time-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: rgba(255,255,255,0.9);
            font-family: 'Pretendard', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            width: 78px;
            text-align: center;
            padding: 4px 0;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            -moz-appearance: textfield;
        }
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .time-input:focus {
            border-color: rgba(100,180,255,0.6);
            background: rgba(255,255,255,0.15);
        }

        .input-colon {
            font-size: 2.2rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            padding: 0 2px;
            margin-top: 16px;
        }

        /* 타이머 진행 링 */
        .ring-wrap {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0.2rem auto 0.8rem;
        }
        .ring-wrap svg {
            transform: rotate(-90deg);
            width: 90px; height: 90px;
        }
        .ring-track {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 5;
        }
        .ring-progress {
            fill: none;
            stroke: rgba(100,190,255,0.7);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 251.2;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.25s linear, stroke 0.4s ease;
        }
        .ring-progress.warn { stroke: rgba(255,180,60,0.8); }
        .ring-progress.danger { stroke: rgba(255,90,80,0.8); }
        .ring-inner-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ring-pct {
            font-size: 1.3rem;
            font-weight: 600;
            color: rgba(255,255,255,0.75);
        }

        /* 타이머 큰 숫자 */
        .timer-big {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            margin-bottom: 0.3rem;
        }
        .timer-big span {
            font-size: 3.6rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: rgba(255,255,255,0.15);
            -webkit-text-stroke: 1px rgba(255,255,255,0.55);
            text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 2px 8px rgba(255,255,255,0.08);
        }
        .timer-big .colon {
            font-size: 3.2rem;
            padding: 0 1px;
        }

        /* 랩 리스트 */
        .lap-list {
            width: 100%;
            max-height: 130px;
            overflow-y: auto;
            margin-top: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .lap-list::-webkit-scrollbar { width: 4px; }
        .lap-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .lap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.78rem;
            color: rgba(200,220,255,0.75);
            font-weight: 600;
            animation: lapIn 0.2s ease-out;
        }
        @keyframes lapIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lap-item .lap-num { color: rgba(200,220,255,0.45); }
        .lap-item .lap-split { color: rgba(140,200,255,0.9); }
        .lap-item.best { border-color: rgba(100,220,130,0.3); background: rgba(100,220,130,0.07); }
        .lap-item.worst { border-color: rgba(255,120,100,0.3); background: rgba(255,120,100,0.07); }

        /* 알람 오버레이 */
        @keyframes alarmPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(100,200,255,0.4); }
            50%       { box-shadow: 0 0 0 20px rgba(100,200,255,0); }
        }
        .alarm-active {
            animation: alarmPulse 0.7s ease-in-out infinite;
        }

        /* 푸터 */
        .footer {
            position: fixed;
            bottom: 24px;
            font-size: 0.7rem;
            color: rgba(180,210,255,0.28);
            letter-spacing: 0.04em;
            text-align: center;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .glass-card { width: 94vw; padding: 1.6rem 1.2rem 1.8rem; }
            .clock-display span, .big-time span { font-size: 3rem; }
            .timer-big span { font-size: 2.6rem; }
            .time-input { font-size: 1.7rem; width: 60px; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="glass-card" id="glassCard">
        <div class="server-badge">hcuhs.kr 서버 시간</div>

        <!-- 탭 네비게이션 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="clock">서버 시계</button>
            <button class="tab-btn" data-tab="timer">타이머</button>
            <button class="tab-btn" data-tab="stopwatch">스톱워치</button>
        </div>

        <!-- ───────── 서버 시계 패널 ───────── -->
        <div class="tab-panel active" id="panel-clock">
            <div class="date-display" id="dateDisplay">0000/00/00 - ---요일</div>
            <div class="clock-display">
                <span id="dHH">--</span>
                <span class="colon">:</span>
                <span id="dMM">--</span>
                <span class="colon">:</span>
                <span id="dSS">--</span>
            </div>
            <div class="sync-status" id="syncStatus">서버 시간 동기화 중…</div>
        </div>

        <!-- ───────── 타이머 패널 ───────── -->
        <div class="tab-panel" id="panel-timer">

            <!-- 입력 상태 -->
            <div id="timerInputArea">
                <div class="timer-inputs">
                    <div class="time-input-wrap">
                        <span class="time-input-label">시간</span>
                        <input class="time-input" id="ti-h" type="number" min="0" max="99" value="00" placeholder="00">
                    </div>
                    <span class="input-colon">:</span>
                    <div class="time-input-wrap">
                        <span class="time-input-label">분</span>
                        <input class="time-input" id="ti-m" type="number" min="0" max="59" value="05" placeholder="00">
                    </div>
                    <span class="input-colon">:</span>
                    <div class="time-input-wrap">
                        <span class="time-input-label">초</span>
                        <input class="time-input" id="ti-s" type="number" min="0" max="59" value="00" placeholder="00">
                    </div>
                </div>
            </div>

            <!-- 실행 상태 -->
            <div id="timerRunArea" style="display:none; flex-direction:column; align-items:center; width:100%;">
                <div class="timer-big">
                    <span id="t-h">00</span>
                    <span class="colon">:</span>
                    <span id="t-m">00</span>
                    <span class="colon">:</span>
                    <span id="t-s">00</span>
                </div>
            </div>

            <div class="ctrl-row">
                <button class="ctrl-btn primary" id="timerStartBtn">시작</button>
                <button class="ctrl-btn secondary" id="timerResetBtn">초기화</button>
            </div>
        </div>

        <!-- ───────── 스톱워치 패널 ───────── -->
        <div class="tab-panel" id="panel-stopwatch">
            <div class="big-time">
                <span id="sw-h">00</span>
                <span class="colon">:</span>
                <span id="sw-m">00</span>
                <span class="colon">:</span>
                <span id="sw-s">00</span>
                <span class="ms" id="sw-ms">.00</span>
            </div>

            <div class="ctrl-row">
                <button class="ctrl-btn primary" id="swStartBtn">시작</button>
                <button class="ctrl-btn secondary" id="swLapBtn" disabled>랩</button>
                <button class="ctrl-btn secondary" id="swResetBtn" disabled>초기화</button>
            </div>

            <div class="lap-list" id="lapList"></div>
        </div>
    </div>

    <div class="footer">copyright &copy; 2026. 민준<br>All rights reserved.</div>

    <script>
    // ─── 파티클 ──────────────────────────────────────
    (function () {
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const el = document.createElement('div');
            el.className = 'particle';
            const size = Math.random() * 6 + 3;
            const duration = Math.random() * 10 + 15;
            const negDelay = -(Math.random() * duration);
            el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${duration}s;animation-delay:${negDelay}s;`;
            container.appendChild(el);
        }
    })();

    // ─── 탭 ──────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        });
    });

    // ─── 서버 시간 동기화 ─────────────────────────────
    let timeOffset = 0;
    const timeApis = [
        async () => {
            const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Seoul');
            const data = await res.json();
            return new Date(data.datetime).getTime();
        },
        async () => {
            const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul');
            const data = await res.json();
            return new Date(data.dateTime).getTime();
        }
    ];

    async function syncServerTime() {
        const syncEl = document.getElementById('syncStatus');
        for (const api of timeApis) {
            try {
                const start = Date.now();
                const serverTime = await api();
                const elapsed = Date.now() - start;
                timeOffset = serverTime - start - elapsed / 2;
                syncEl.textContent = '● 서버 시간 동기화 완료';
                syncEl.className = 'sync-status synced';
                setTimeout(() => { syncEl.style.opacity = '0.4'; }, 4000);
                return;
            } catch (e) {}
        }
        syncEl.textContent = '○ 동기화 실패 — 로컬 시간 사용 중';
        syncEl.className = 'sync-status failed';
    }

    const DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    function pad(n) { return String(n).padStart(2, '0'); }

    function setDigit(el, val) {
        if (el.textContent === val) return;
        el.textContent = val;
        el.classList.remove('digit-tick');
        void el.offsetWidth;
        el.classList.add('digit-tick');
    }

    const elHH = document.getElementById('dHH');
    const elMM = document.getElementById('dMM');
    const elSS = document.getElementById('dSS');

    function updateClock() {
        const now = new Date(Date.now() + timeOffset);
        const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());
        const y = now.getFullYear(), mo = pad(now.getMonth()+1), d = pad(now.getDate());
        const day = DAYS[now.getDay()];
        document.getElementById('dateDisplay').textContent = `${y}/${mo}/${d} - ${day}`;
        setDigit(elSS, s);
        setDigit(elMM, m);
        setDigit(elHH, h);
    }

    syncServerTime();
    setInterval(syncServerTime, 60000);
    setInterval(updateClock, 200);
    updateClock();

    // ─── 타이머 ───────────────────────────────────────
    (function() {
        let totalSecs = 0, remainSecs = 0, timerInterval = null, running = false;

        const startBtn = document.getElementById('timerStartBtn');
        const resetBtn = document.getElementById('timerResetBtn');
        const inputArea = document.getElementById('timerInputArea');
        const runArea   = document.getElementById('timerRunArea');
        const tH = document.getElementById('t-h');
        const tM = document.getElementById('t-m');
        const tS = document.getElementById('t-s');

        function getInputSecs() {
            const h = parseInt(document.getElementById('ti-h').value)||0;
            const m = parseInt(document.getElementById('ti-m').value)||0;
            const s = parseInt(document.getElementById('ti-s').value)||0;
            return h*3600 + m*60 + s;
        }

        function renderTimer(secs) {
            const h = Math.floor(secs/3600);
            const m = Math.floor((secs%3600)/60);
            const s = secs%60;
            setDigit(tH, pad(h));
            setDigit(tM, pad(m));
            setDigit(tS, pad(s));
        }

        function startTimer() {
            totalSecs = remainSecs = getInputSecs();
            if (totalSecs === 0) return;

            inputArea.style.display = 'none';
            runArea.style.display = 'flex';
            running = true;
            startBtn.textContent = '일시정지';
            startBtn.classList.add('running');
            renderTimer(remainSecs);

            timerInterval = setInterval(() => {
                remainSecs--;
                renderTimer(remainSecs);
                if (remainSecs <= 0) {
                    clearInterval(timerInterval);
                    running = false;
                    startBtn.textContent = '시작';
                    startBtn.classList.remove('running');
                    triggerAlarm();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            running = false;
            startBtn.textContent = '재개';
            startBtn.classList.remove('running');
        }

        function resumeTimer() {
            running = true;
            startBtn.textContent = '일시정지';
            startBtn.classList.add('running');
            timerInterval = setInterval(() => {
                remainSecs--;
                renderTimer(remainSecs);
                if (remainSecs <= 0) {
                    clearInterval(timerInterval);
                    running = false;
                    startBtn.textContent = '시작';
                    startBtn.classList.remove('running');
                    triggerAlarm();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            running = false;
            remainSecs = 0;
            startBtn.textContent = '시작';
            startBtn.classList.remove('running');
            inputArea.style.display = '';
            runArea.style.display = 'none';
            document.getElementById('glassCard').classList.remove('alarm-active');
        }

        let alarmTimeout = null;
        function triggerAlarm() {
            const card = document.getElementById('glassCard');
            card.classList.add('alarm-active');
            // 비프음 (Web Audio API)
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.3, 0.6].forEach(delay => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.25);
                });
            } catch(e) {}

            clearTimeout(alarmTimeout);
            alarmTimeout = setTimeout(() => {
                card.classList.remove('alarm-active');
            }, 4000);
        }

        startBtn.addEventListener('click', () => {
            if (runArea.style.display === 'none' || runArea.style.display === '') {
                startTimer();
            } else if (running) {
                pauseTimer();
            } else {
                resumeTimer();
            }
        });

        resetBtn.addEventListener('click', resetTimer);

        // 입력값 클램프 + zero-pad
        ['ti-h','ti-m','ti-s'].forEach(id => {
            const el = document.getElementById(id);
            const max = id === 'ti-h' ? 99 : 59;
            el.addEventListener('change', function() {
                if (this.value > max) this.value = max;
                if (this.value < 0)   this.value = 0;
            });
            el.addEventListener('blur', function() {
                const v = parseInt(this.value) || 0;
                this.value = pad(v);
            });
            el.addEventListener('focus', function() {
                // 포커스 시 앞의 0 제거해서 편집 편하게
                const v = parseInt(this.value) || 0;
                this.value = String(v);
            });
        });
    })();

    // ─── 스톱워치 ──────────────────────────────────────
    (function() {
        let startTime = 0, elapsed = 0, rafId = null, running = false;
        let lapStart = 0, laps = [];

        const swStartBtn = document.getElementById('swStartBtn');
        const swLapBtn   = document.getElementById('swLapBtn');
        const swResetBtn = document.getElementById('swResetBtn');
        const swH  = document.getElementById('sw-h');
        const swM  = document.getElementById('sw-m');
        const swS  = document.getElementById('sw-s');
        const swMs = document.getElementById('sw-ms');
        const lapList = document.getElementById('lapList');

        function renderSW(ms) {
            const totalMs = ms;
            const h  = Math.floor(totalMs / 3600000);
            const m  = Math.floor((totalMs % 3600000) / 60000);
            const s  = Math.floor((totalMs % 60000) / 1000);
            const cs = Math.floor((totalMs % 1000) / 10);
            setDigit(swH, pad(h));
            setDigit(swM, pad(m));
            setDigit(swS, pad(s));
            swMs.textContent = '.' + pad(cs);
        }

        function tick() {
            elapsed = Date.now() - startTime;
            renderSW(elapsed);
            rafId = requestAnimationFrame(tick);
        }

        function formatLapTime(ms) {
            const m  = Math.floor(ms / 60000);
            const s  = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return `${pad(m)}:${pad(s)}.${pad(cs)}`;
        }

        function renderLaps() {
            if (laps.length === 0) return;
            const splits = laps.map(l => l.split);
            const minSplit = Math.min(...splits);
            const maxSplit = Math.max(...splits);
            lapList.innerHTML = '';
            [...laps].reverse().forEach(l => {
                const div = document.createElement('div');
                div.className = 'lap-item';
                if (laps.length > 1 && l.split === minSplit) div.classList.add('best');
                if (laps.length > 1 && l.split === maxSplit) div.classList.add('worst');
                div.innerHTML = `<span class="lap-num">랩 ${l.n}</span><span>${formatLapTime(l.total)}</span><span class="lap-split">+${formatLapTime(l.split)}</span>`;
                lapList.appendChild(div);
            });
        }

        swStartBtn.addEventListener('click', () => {
            if (!running) {
                running = true;
                startTime = Date.now() - elapsed;
                if (laps.length === 0) lapStart = startTime;
                swStartBtn.textContent = '일시정지';
                swStartBtn.classList.add('running');
                swLapBtn.disabled = false;
                swResetBtn.disabled = false;
                tick();
            } else {
                running = false;
                cancelAnimationFrame(rafId);
                swStartBtn.textContent = '재개';
                swStartBtn.classList.remove('running');
            }
        });

        swLapBtn.addEventListener('click', () => {
            if (!running) return;
            const now = Date.now();
            const total = now - startTime + elapsed - (startTime - (Date.now() - elapsed));
            // 현재 경과 시간
            const curElapsed = Date.now() - startTime;
            const prevTotal = laps.length > 0 ? laps[laps.length-1].total : 0;
            const split = curElapsed - prevTotal;

            laps.push({ n: laps.length+1, total: curElapsed, split });
            renderLaps();
        });

        swResetBtn.addEventListener('click', () => {
            cancelAnimationFrame(rafId);
            running = false;
            elapsed = 0; laps = [];
            swStartBtn.textContent = '시작';
            swStartBtn.classList.remove('running');
            swLapBtn.disabled = true;
            swResetBtn.disabled = true;
            renderSW(0);
            lapList.innerHTML = '';
        });
    })();
    </script>
</body>
