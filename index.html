<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 시계 — hcuhs.kr</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a6e 0%, #2a52a0 30%, #1a3a7c 60%, #162d5e 100%);
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100,170,255,0.2) 0%, transparent 70%);
            top: -200px; left: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(130,200,255,0.15) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            pointer-events: none;
        }

        /* 파티클 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(180,210,255,0.2);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }

        /* 메인 카드 */
        .glass-card {
            position: relative;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 32px;
            padding: 3rem 3.5rem;
            text-align: center;
            width: 420px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            border-radius: 32px 32px 0 0;
        }

        /* 배지 */
        .server-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(220,235,255,0.9);
            letter-spacing: 0.05em;
            margin-bottom: 1.3rem;
        }

        /* 날짜+요일 한 줄 — 글래스모피즘 텍스트 */
        .date-display {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-bottom: 0.7rem;

            color: rgba(255,255,255,0.75);
        }

        /* 시계 — 숫자를 개별 span으로 분리 */
        .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0;
            line-height: 1;
            margin-bottom: 0.7rem;
        }

        /* 공통 숫자/콜론 스타일 */
        .clock-display span {
            font-size: 4.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            display: inline-block;

            color: rgba(255,255,255,0.15);
            -webkit-text-stroke: 1px rgba(255,255,255,0.55);
            text-shadow:
                0 1px 0 rgba(255,255,255,0.4),
                0 2px 8px rgba(255,255,255,0.08);
            filter: drop-shadow(0 2px 6px rgba(200,220,255,0.2));
        }

        .clock-display .colon {
            font-size: 4rem;
            letter-spacing: 0;
            padding: 0 1px;
            /* 콜론은 애니메이션 없음 */
        }

        /* 숫자 바뀔 때 애니메이션 */
        @keyframes digitTick {
            0%   { opacity: 0.4; transform: translateY(-4px); }
            100% { opacity: 1;   transform: translateY(0); }
        }
        .digit-tick {
            animation: digitTick 0.2s ease-out both;
        }

        /* 동기화 상태 */
        .sync-status {
            margin-top: 1rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(200,220,255,0.5);
            letter-spacing: 0.04em;
            transition: all 0.4s ease;
            min-height: 1.2em;
        }
        .sync-status.synced { color: rgba(100,220,130,0.8); }
        .sync-status.failed { color: rgba(255,120,120,0.8); }

        /* 푸터 */
        .footer {
            position: fixed;
            bottom: 24px;
            font-size: 0.7rem;
            color: rgba(180,210,255,0.28);
            letter-spacing: 0.04em;
            text-align: center;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .glass-card { width: 90vw; height: auto; padding: 2.2rem 1.5rem; }
            .clock-display span { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="glass-card">
        <div class="server-badge">hcuhs.kr 서버 시간</div>

        <div class="date-display" id="dateDisplay">0000/00/00 - ---요일</div>


        <!-- 시·분·초 각각 span으로 분리 -->
        <div class="clock-display">
            <span id="dHH">--</span>
            <span class="colon">:</span>
            <span id="dMM">--</span>
            <span class="colon">:</span>
            <span id="dSS">--</span>
        </div>

        <div class="sync-status" id="syncStatus">서버 시간 동기화 중…</div>
    </div>

    <div class="footer">copyright &copy; 2026. 민준 · All rights reserved.</div>

    <script>
        // ─── 파티클 ──────────────────────────────────────
        (function () {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'particle';
                const size = Math.random() * 6 + 3;
                const duration = Math.random() * 10 + 15; // 15~25초로 느리게
                const negDelay = -(Math.random() * duration);
                el.style.cssText = `
                    width:${size}px; height:${size}px;
                    left:${Math.random() * 100}%;
                    animation-duration:${duration}s;
                    animation-delay:${negDelay}s;
                `;
                container.appendChild(el);
            }
        })();

        // ─── 시간 동기화 ──────────────────────────────────
        let timeOffset = 0;

        const timeApis = [
            async () => {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Seoul');
                const data = await res.json();
                return new Date(data.datetime).getTime();
            },
            async () => {
                const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul');
                const data = await res.json();
                return new Date(data.dateTime).getTime();
            }
        ];

        async function syncServerTime() {
            const syncEl = document.getElementById('syncStatus');
            for (const api of timeApis) {
                try {
                    const start = Date.now();
                    const serverTime = await api();
                    const elapsed = Date.now() - start;
                    timeOffset = serverTime - start - elapsed / 2;
                    syncEl.textContent = '서버 시간 동기화 완료';
                    syncEl.className = 'sync-status synced';
                    setTimeout(() => { syncEl.style.opacity = '0.4'; }, 4000);
                    return;
                } catch (e) {}
            }
            syncEl.textContent = '동기화 실패 — 로컬 시간 사용 중';
            syncEl.className = 'sync-status failed';
        }

        // ─── 시계 ─────────────────────────────────────────
        const DAYS = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        function pad(n) { return String(n).padStart(2, '0'); }

        // 값이 바뀐 span에만 애니메이션 적용
        function setDigit(el, val) {
            if (el.textContent === val) return;
            el.textContent = val;
            el.classList.remove('digit-tick');
            void el.offsetWidth;
            el.classList.add('digit-tick');
        }

        const elHH = document.getElementById('dHH');
        const elMM = document.getElementById('dMM');
        const elSS = document.getElementById('dSS');

        function updateClock() {
            const now = new Date(Date.now() + timeOffset);
            const h = pad(now.getHours());
            const m = pad(now.getMinutes());
            const s = pad(now.getSeconds());
            const y = now.getFullYear();
            const mo = pad(now.getMonth() + 1);
            const d = pad(now.getDate());
            const day = DAYS[now.getDay()];

            document.getElementById('dateDisplay').textContent =
                `${y}/${mo}/${d} - ${day}`;

            setDigit(elSS, s);       // 매초
            setDigit(elMM, m);       // 분 바뀔 때만 애니메이션
            setDigit(elHH, h);       // 시 바뀔 때만 애니메이션
        }

        syncServerTime();
        setInterval(syncServerTime, 60000);
        setInterval(updateClock, 200);
        updateClock();
    </script>
</body>
</html>
